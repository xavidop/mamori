version: 2
updates:
  # Core module
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    groups:
      go-dependencies:
        patterns: ["*"]
    labels: [dependencies, go]

  # Provider modules (each is its own module)
  - package-ecosystem: gomod
    directory: "/providers/aws"
    schedule: { interval: weekly }
    labels: [dependencies, go, provider:aws]
