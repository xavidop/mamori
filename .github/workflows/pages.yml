name: Docs

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs for the same ref.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Astro site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v6
      - name: Install dependencies
        working-directory: site
        run: npm ci || npm install
      - name: Build
        working-directory: site
        # BASE_PATH lets Astro emit correct asset URLs for the project site
        # https://mamorigo.dev/
        # PUBLIC_GA_ID (optional) enables Google Analytics, loaded only after the
        # visitor accepts the cookie banner. Set it as a repository variable named
        # GA_ID (Settings -> Secrets and variables -> Actions -> Variables).
        env:
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
          PUBLIC_GA_ID: ${{ vars.GA_ID }}
        run: npm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
