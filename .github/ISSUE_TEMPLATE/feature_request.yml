name: ✨ Feature request
description: Suggest a capability for mamori core or middleware
labels: [enhancement, triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case, not just the proposed solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed API / behavior
      description: Sketch the option, method, or tag you have in mind.
      render: go
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This fits mamori's non-goals (not a secrets store, not a sync engine, not a feature-flag system).
